<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Workout Complete</title>

  <style>
    * {
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      margin: 0;
      height: 100vh;
      background: #0a4f73;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      position: relative;
    }

    .confetti {
      position: fixed;
      width: 100%;
      height: 100%;
      overflow: hidden;
      top: 0;
      left: 0;
      z-index: 0;
      pointer-events: none;
    }

    .confetti-piece {
      position: absolute;
      width: 10px;
      height: 14px;
      top: -20px;
      animation: fall linear infinite;
      opacity: 0.9;
    }

    @keyframes fall {
      to {
        transform: translateY(110vh) rotate(720deg);
      }
    }

    
    .card {
      position: relative;
      z-index: 1;
      text-align: center;
    }

    h1 {
      letter-spacing: 4px;
      margin-bottom: 40px;
    }

    
    .avatar-complete {
      width: 150px;
      height: 220px;
      margin: 0 auto 40px;
      position: relative;
    }

    .michalis-layers {
      position: relative;
      width: 100%;
      height: 100%;
    }

    .michalis-layers img {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: contain;
    }

    
    .continue-btn {
      background: #9be37b;
      border: none;
      padding: 18px 48px;
      font-size: 28px;
      border-radius: 6px;
      cursor: pointer;
      letter-spacing: 3px;
    }

    .continue-btn:hover {
      opacity: 0.9;
    }

    a {
      text-decoration: none;
      color: black;
    }
    .std-display {
      display: none; 
    }
 @keyframes bounce {
  0%   { transform: translateY(0); }
  50%  { transform: translateY(-12px); }
  100% { transform: translateY(0); }
}

.bounce {
  animation: bounce 1s ease-in-out infinite;
}
  </style>
</head>

<body>

  <div class="confetti"></div>

  <div class="card">
    <h1>WORKOUT COMPLETE!</h1>
    <p>Total reps: {{ this_total_reps }} reps</p>

  <p>Time to complete: {{ "%.1f"|format(this_workout_duration) }} seconds</p>
  <p id="squats-row" class="std-display">Squat consistency: <span id="squats-std">...</span></p>
  <p id="lunges-row" class="std-display">Lunge consistency: <span id="lunges-std">...</span></p>
  <p id="situps-row" class="std-display">Situp consistency: <span id="situps-std">...</span></p>
    <div class="avatar-complete">
      <div  class=" bounce michalis-layers">
        <div class="base-body"> 
          <img src="{{ url_for('static', filename='michalis/template.png') }}" alt="template">  
        </div>
        <div class="base-arms">
          <img src="{{ url_for('static', filename='michalis/high arms.png') }}" alt="high arms">  
        </div>
        <div class="expression">
          <img src="{{ url_for('static', filename='michalis/bigsmile.png') }}" alt="smile">   
        </div> 
        <img id="layer-sleeves" 
                    src="{{ url_for('static', filename='outfits/high arms/' + (equipped if equipped else 'business') + ' high arms.png') }}" 
                    alt="sleeves">  
        <div class="torso">
          <img src="{{ url_for('static', filename='outfits/torso/' + (equipped if equipped else 'business') + ' torso.png') }}" alt="torso">  
        </div>
      </div>
    </div>

    <a href="{{ url_for('profile') }}">
      <button class="continue-btn">PROFILE</button>
    </a>
  </div>

  <script>
    async function getConsistencyScore() {
    try {
        const response =  await fetch('/get_interval_std');
        const stats =  await response.json(); // intervalSTDMap dict

        for (const [exercise, score] of Object.entries(stats)) {
            const row = document.getElementById(`${exercise}-row`);
            const span = document.getElementById(`${exercise}-std`);
            
            if (row && span) {
                span.innerText = ` ${score}%`;
                // show the <p>
                row.style.display = "block"; 
            }
        }
        } catch (error) {
            console.error("Failed to fetch consistency stats:", error);
        }
      }
      
  document.addEventListener('DOMContentLoaded', () => {
    getConsistencyScore();
  });

  const arms = document.querySelector(".base-arms img");

// setInterval(() => {
//     if (arms.src.includes("high arms")) {
//         arms.src = "/static/michalis/low arms.png";
//     } else {
//         arms.src = "/static/michalis/high arms.png";
//     }
// }, 400);

    const confettiContainer = document.querySelector('.confetti');
    const colors = ['#ffd966', '#ff6f61', '#6ec6ff', '#9be37b', '#ffffff'];

    for (let i = 0; i < 150; i++) {
      const confetti = document.createElement('div');
      confetti.classList.add('confetti-piece');

      confetti.style.left = Math.random() * 100 + 'vw';
      confetti.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
      confetti.style.animationDuration = (Math.random() * 3 + 2) + 's';
      confetti.style.animationDelay = Math.random() * 5 + 's';

      confettiContainer.appendChild(confetti);
    }
  </script>

</body>
</html>
