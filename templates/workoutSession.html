<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>JUST DID IT</title>
        <style>
    :root{
      --bg-main: #1f4d69;
      --panel-top: #d8eff4;
      --card: rgba(0,0,0,.18);
      --divider: rgba(255,255,255,.22);
      --text-dark: #0f1a1f;
      --text-light: rgba(255,255,255,.92);
      --shadow: 0 10px 30px rgba(0,0,0,.18);
      --font: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
    }
    *{ box-sizing: border-box; }
    body{
      margin: 0;
      font-family: var(--font);
      background: #0f2330;
      color: white;
      min-height: 100vh;
    }


    .main{
      background: var(--bg-main);
      min-height: 100vh;
    }


    /* ---------------- TOP BAR ---------------- */
    .top-strip{
      height: 90px;
      background: var(--panel-top);
      color: var(--text-dark);
      display: flex;
      align-items: center;
      padding: 0 26px;
      border-bottom: 3px solid rgba(0,0,0,.12);
      justify-content: space-between;
    }


    .top-strip h1{
      margin: 0;
      font-size: 28px;
      font-weight: 500;
      letter-spacing: .5px;
    }


    .end-btn{
      background:#ffb3b3; /* light red */
      padding:10px 16px;
      border-radius:10px;
      text-decoration:none;
      color:#5a0000;
      font-weight:600;
      box-shadow: 0 6px 14px rgba(0,0,0,.16);
      transition:.15s;
    }


    .end-btn:hover{
      background:#ff9999;
    }


    /* ---------------- CONTENT ---------------- */
    .content{
      padding: 26px;
      display: grid;
      grid-template-columns: 1fr 1.4fr;
      gap: 26px;
      align-items: stretch;
    }


    /* Left column */
    .left-panel{
      display: flex;
      flex-direction: column;
      gap: 18px;
    }

    .right-panel{
      display: flex;
      flex-direction: column;
      gap: 18px;
    }


    .info-card{
      background: var(--card);
      border: 2px solid rgba(0,0,0,.2);
      box-shadow: var(--shadow);
      padding: 18px;
      border-radius: 6px;
    }


    .info-card h2{
      margin: 0 0 8px;
      font-size: 20px;
      color: var(--text-light);
    }


    .info-card h3{
      margin: 0;
      font-size: 26px;
      font-weight: 600;
      color: white;
    }


    /* Buttons */
    .btn-row{
      display: flex;
      gap: 12px;
      margin-top: 10px;
    }


    .btn{
      flex: 1;
      padding:20px 40px;
      border-radius: 10px;
      border: none;
      background: white;
      font-family: var(--font);
      font-size: 16px;
      cursor: pointer;
      box-shadow: 0 6px 14px rgba(0,0,0,.16);
    }


    #overlay{
      position:absolute;
      inset:0;
      display:flex;
      justify-content:center;
      align-items:center;
      background: rgba(0,0,0,.35);
      z-index: 200;
    }


    .start-btn{
      padding:20px 40px;
      font-size:14px;
      border-radius:14px;
    }


    .btn:active{
      transform: translateY(1px);
    }


    .exercise-preview{
      margin-top: auto;  /* pushes preview to the bottom of left panel */

      bottom: 20px;
      left: 20px;
      background: rgba(0,0,0,.25);
      border-radius: 12px;
      padding: 8px;
      box-shadow: var(--shadow);
    }


    .exercise-preview img{
      width: 100%;
      height: 100%;
      object-fit: contain;
    }


    .exercise-preview{
      display: none;
    }


    /* ---------------- CAMERA ---------------- */
/* Constrain the camera box to a 16:9 aspect ratio container */
    .camera-box {
        background: #000; /* Black bars if the feed doesn't fit */
        border: 4px solid rgba(255,255,255,0.1);
        box-shadow: var(--shadow);
        border-radius: 12px;
        overflow: hidden;
        width: 100%;
        max-width: 100vh; /* Limits the width so it's not "too wide" */
        margin: 0 auto;   /* Centers it */
        position: relative;
    }


    .camera-box img:not(.avatar-part) {
        width: 100%;
        height: 100%;
        object-fit: contain; 
        display: none;
        transform: scaleX(-1); 
    }


    /*workout progress bar*/
    .total-rep-bar{
      width: 100%;
      height: 50px;
      background: rgba(255,255,255,.25);
      border-radius: 12px;
      overflow: hidden;
      margin: 20px;
      line-height: 50px;
    }


    .total-rep-percentage{
      height: 100%;
      width: 0%;
      background: limegreen;
      text-align: center;
      line-height: 50px;
      color: black;
      font-weight: bold;
      transition: width 0.3s ease;
    }
    .avatar-box {
      position: absolute;
      bottom: 0;
      right: 0;
      width: 250px;  
      height: 350px; 
    }
    .michalis-layers img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: block !important; /* Overrides the 'display: none' in your camera-box img rule */
      transform: none /*no mirroringg  */
    }

    .avatar-box img {
        position: absolute;
        top: 0; left: 0;
        width: 100%; height: 100%;
        object-fit: contain;
    }

    .base  { z-index: 1; }
    .torso { z-index: 2; }
    .head  { z-index: 5; }
    .arms  { z-index: 4; }

    /* Responsive */
    @media(max-width: 900px){
      .content{
        grid-template-columns: 1fr;
      }
      .camera-box{
        height: 600px;
      }
    }

    @keyframes bounce {
        0%, 100% { transform: translate(3px,8px); }
        50%       { transform: translate(3px, 0px); }
    }

    .avatar-box .expression img {
       transform-origin: center center;
        animation: bounce 2s ease-in-out infinite;
            position: relative;

        z-index: 10;
    }

    @keyframes expandFade {
      0%   { transform: scale(0.5); opacity: 1; }
      100% { transform: scale(2.5); opacity: 0; }
    }

    .avatar-burst {
        position: fixed;
        inset: 0;
        margin:auto;
        transform: translate(-50%, -50%);
        width: 300px;
        height: 500px;
        pointer-events: none;
        z-index: 99;
        perspective: 700px;
        opacity: 0;
    }
    .avatar-burst .michalis-layers {
        position: relative;
        width: 100%;
        height: 100%;
    }
    .avatar-burst .michalis-layers img {
        position: absolute;
        top: 0; left: 0;
        width: 100%;
        height: 100%;
        object-fit: contain;
    }
    .avatar-burst.playing {
        animation:
         expandFade 3s ease-out forwards;
    }
  .burst-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.95);
      pointer-events: none;
      z-index: 98;
      opacity: 0;
  }

  @keyframes overlayFade {
      0%   { opacity: 1; }
      100% { opacity: 0; }
  }

  .burst-overlay.playing {
      animation: overlayFade 3s ease-out forwards;
  }
        </style>
</head>


<body>
      <main class="main">
         <header class="top-strip">
          <h1>Workout Session</h1>
          <a href="{{ url_for('home') }}" class="end-btn">
            End Workout
          </a>
        </header>
    <div class="burst-overlay" id="burst-overlay"></div>

    <div class="avatar-burst" id="avatar-burst">
        <div class="michalis-layers">
            <div class="base-body"> 
                <img src="{{ url_for('static', filename='michalis/template.png') }}" alt="template">  
            </div>
            <div class="base-arms">
                <img src="{{ url_for('static', filename='michalis/high arms.png') }}" alt="high arms pose1">  
            </div>
            <div class="expression">
                <img src="{{ url_for('static', filename='michalis/bigsmile.png') }}" alt="slight smile">   
            </div> 
            <div class="sleeves">
                <img id="layer-sleeves" 
                    src="{{ url_for('static', filename='outfits/high arms/' + (equipped if equipped else 'business') + ' high arms.png') }}" 
                    alt="sleeves">  
            </div>
            <div class="torso">
                <img id="layer-torso" 
                    src="{{ url_for('static', filename='outfits/torso/' + (equipped if equipped else 'business') + ' torso.png') }}" 
                    alt="torso">  
            </div>
        </div>
    </div>
<div class="content">
      <div class="left-panel">
        <div class="info-card">
          <h2 id="exercise_label">Current Exercise</h2>
          <h3 id="exercise_name">Loading...</h3>
        </div>
          <div class="info-card" id ="reps_card">
            <h2>Reps</h2>
          <h3 id="rep_count">0</h3>
        </div>
        <div class="info-card" id="timer_card" style="display:none;">
          <h2>Time Remaining</h2>
          <h3 id="timer_display">30</h3>
        </div>
        <!-- <h1 id="current_state">state</h1> -->

          <div class="exercise-preview">
            <img id="exercise_gif" src="{{ url_for('static', filename='squats.gif') }}">
          </div>

        </div>

      <div class="right-panel">
        <div class="camera-box">  
              <img src="{{ url_for('webcam_feed') }}">
          <div class="avatar-box">
              <div class="michalis-layers">
                  <div class="base-body"> 
                      <img src="{{ url_for('static', filename='michalis/template.png') }}" alt="template">  
                  </div>
                  <div class="base-arms">
                      <img src="{{ url_for('static', filename='michalis/low arms.png') }}" alt="low arms pose1">  
                  </div>
                  <div class="expression">
                      <img src="{{ url_for('static', filename='michalis/slightsmile.png') }}" alt="slight smile">   
                  </div> 
                  <div class="sleeves">
                      <img id="layer-sleeves" 
                          src="{{ url_for('static', filename='outfits/low arms/' + (equipped if equipped else 'business') + ' low arms.png') }}" 
                          alt="sleeves">  
                  </div>
                  <div class="torso">
                      <img id="layer-torso" 
                          src="{{ url_for('static', filename='outfits/torso/' + (equipped if equipped else 'business') + ' torso.png') }}" 
                          alt="torso">  
                  </div>
              </div>
          </div>
        </div>

        <div class="total-rep-bar">
            <div id="total-rep-percentage" class="total-rep-percentage">
              0%
            </div>  

        </div> 
          <div id="overlay">
            <button class="btn" onclick="startSession()">start camera feed!</button>
        </div>
      </div>

  <!-- Adding a image to the bottom of the screen amshu -->



  </main>


       <script>
const ding = new Audio("{{ url_for('static', filename='audio/repding.mp3') }}");
const exerciseComplete = new Audio("{{ url_for('static', filename='audio/exerciseComplete.mp3') }}");
const HalfWayThere = new Audio("{{ url_for('static', filename='audio/HalfWayThere.mp3') }}");


/* ---------------- GIF MAP ---------------- */


const gifMap = {
  squats: "{{ url_for('static', filename='squats.gif') }}",
  lunges: "{{ url_for('static', filename='lunges.gif') }}",
  situps: "{{ url_for('static', filename='situps.gif') }}",
  jumpingjacks: "{{ url_for('static', filename='jumpingjacks.gif') }}",
  pushups: "{{ url_for('static', filename='pushups.gif') }}",
  glutebridges: "{{ url_for('static', filename='glutebridges.gif') }}",
  running: "{{ url_for('static', filename='running.gif') }}",
  supermans: "{{ url_for('static', filename='supermans.gif') }}"

};


/* ---------------- WORKOUT ROUTINE ---------------- */

//hardcoded durations and reps, someone please change this
const workoutRoutine = JSON.parse('{{ exercises | tojson | safe }}')
    .map(ex => {
        const normalizedName = ex.name.toLowerCase().replace(/[\s-]/g, "");

        if (["jumpingjacks", "running"].includes(normalizedName)) {
            return { name: ex.name, type: "timer", duration: parseInt(ex.reps) || 30 };
        }

        return { name: ex.name, type: "reps", target: parseInt(ex.reps) || 10 };
    });


/* ---------------- STATE ---------------- */


let routineIndex = 0;
let workoutFinished = false;
let isSwitching = false;


let lastCount = 0;
let repsCompleted = 0;


let timerInterval = null;
let remainingTime = 0;
let statsInterval = null;


const totalReps = workoutRoutine
    .filter(ex => ex.type === "reps")
    .reduce((sum, ex) => sum + ex.target, 0);

    console.log("Total reps:", totalReps, "Routine:", workoutRoutine);


const bar = document.getElementById("total-rep-percentage");


/* ---------------- CHANGE EXERCISE ---------------- */
function burstAvatar() {
    const burst = document.getElementById("avatar-burst");
    const overlay = document.getElementById("burst-overlay");
    
    burst.classList.remove("playing");
    overlay.classList.remove("playing");
    void burst.offsetWidth;
    
    burst.classList.add("playing");
    overlay.classList.add("playing");
}

function changeExercise(name) {

  if(routineIndex>0){
      burstAvatar()

  }
    const normalized = normalizeName(name);


    document.getElementById('exercise_name').innerText = name;


    if (gifMap[normalized]) {
        document.getElementById('exercise_gif').src = gifMap[normalized];
    }


    return fetch('/switch_exercise', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ exercise: normalized })
    });
}


/* ---------------- APPLY UI MODE ---------------- */


function applyExerciseUIMode(ex) {
    if (ex.type === 'timer') {
        document.getElementById('timer_card').style.display = 'block';
        document.getElementById('reps_card').style.display = 'none';
        const stateEl = document.getElementById('current_state');
        if(stateEl) stateEl.innerText = "TIMER";
    } else {
        document.getElementById('timer_card').style.display = 'none';
        document.getElementById('reps_card').style.display = 'block';
    }
}


/* ---------------- TIMER ---------------- */


function startTimer(seconds) {


    clearInterval(timerInterval);
    remainingTime = seconds;

    const halfWayPoint = Math.floor(seconds / 2);

    document.getElementById('timer_display').innerText = remainingTime;


    timerInterval = setInterval(() => {
        remainingTime--;
        document.getElementById('timer_display').innerText = remainingTime;

        if (remainingTime === halfWayPoint) {
          HalfWayThere.play();
        }

        if (remainingTime <= 0) {
            clearInterval(timerInterval);
            timerInterval = null;
            moveToNextExercise();
        }
       
    }, 1000);
   
    fetch('/reset_stats', { method: 'POST' }).catch(()=>{});
}


/* ---------------- NEXT EXERCISE ---------------- */


function normalizeName(name) {
    return name.toLowerCase().replace(/[\s-]/g, "");
}




function moveToNextExercise() {

    exerciseComplete.play();
    clearInterval(timerInterval);


    fetch('/reset_stats', { method: 'POST' })
        .then(() => {


            routineIndex++;


            lastCount = 0;
            document.getElementById('rep_count').innerText = "0";


            if (routineIndex >= workoutRoutine.length) {
                workoutFinished = true;
                window.location.href = "{{ url_for('workoutcomplete') }}";
                return;
            }


            const next = workoutRoutine[routineIndex];


            changeExercise(next.name).then(() => {


                applyExerciseUIMode(next);


                if (next.type === 'timer') {
                    startTimer(next.duration);
                } else {
                   
                    if (statsInterval) clearInterval(statsInterval);
                    statsInterval = setInterval(updateStats, 500);
                }


                isSwitching = false;
            });
        });
}


/* ---------------- UPDATE STATS ---------------- */
//list of all audios (need to update) - amshu
const motivationFiles = [
    'yay1.mp3', 'yay2.mp3',
    'yay3.mp3', 'yay4.mp3'
];

function getRandomMotivation() {
    const randomIndex = Math.floor(Math.random() * motivationFiles.length);
    return `static/audio/${motivationFiles[randomIndex]}`;
}
let milestonesReached = { p25: false, p50: false, p75: false };
function updateStats() {
    if (workoutFinished) return;

    const current = workoutRoutine[routineIndex];

    // Skip timer exercises if (!current || current.type !== "time") return;
    if (!current || current.type !== "reps") return;


    fetch('/get_exercise_data')
        .then(res => res.json())
        .then(data => {

            document.getElementById('rep_count').innerText = data.count;
            // document.getElementById('current_state').innerText = data.state;


            if (data.count > lastCount) {
                const diff = data.count - lastCount;
                repsCompleted += diff;
                lastCount = data.count;
                ding.play();
            }


            if (totalReps > 0) {
                const percent = Math.round((repsCompleted / totalReps) * 100);
                bar.style.width = percent + "%";
                bar.textContent = percent + "%";

                let milestoneToPlay = null;

                if (percent >= 75 && !milestonesReached.p75) {
                    milestoneToPlay = 'p75';
                } else if (percent >= 50 && !milestonesReached.p50) {
                    milestoneToPlay = 'p50';
                } else if (percent >= 25 && !milestonesReached.p25) {
                    milestoneToPlay = 'p25';
                }

                if (milestoneToPlay) {
                    milestonesReached[milestoneToPlay] = true;
                    const motivation = new Audio(getRandomMotivation());
                    motivation.play().catch(e => console.error("Playback blocked:", e));
                }
            }


            if (data.count >= current.target) {
                milestonesReached = { p25: false, p50: false, p75: false };
                clearInterval(statsInterval);  
                statsInterval = null;
                moveToNextExercise();
            }


        });
}


/* ---------------- START SESSION ---------------- */


function startSession() {


    document.getElementById("overlay").style.display = 'none';


    ding.play().then(() => {
        ding.pause();
        ding.currentTime = 0;
    }).catch(()=>{});


    document.querySelector('.camera-box img').style.display = 'block';
    document.querySelector('.exercise-preview').style.display = 'block';
    //loads first gif
    const first = workoutRoutine[0];
    changeExercise(first.name);
    applyExerciseUIMode(first);


    if (first.type === 'timer') {
        startTimer(first.duration);
    }else{


      if (statsInterval) clearInterval(statsInterval);
      statsInterval = setInterval(updateStats, 500);
    }
}


/* ---------------- INIT ---------------- */


window.onload = () => {


    repsCompleted = 0;
    lastCount = 0;
    routineIndex = 0;
    workoutFinished = false;


    bar.style.width = "0%";
    bar.textContent = "0%";


    if (workoutRoutine.length > 0) {
        changeExercise(workoutRoutine[0].name);
    }
};
console.log("Workout Routine:", workoutRoutine);
</script>


</html>
