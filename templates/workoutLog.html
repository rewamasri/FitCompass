<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Fit Compass - Workout Log</title>

<style>
:root{
  --bg-main: #1f4d69;
  --bg-sidebar: #d8eff4;
  --panel-top: #d8eff4;
  --log-row: rgba(0,0,0,.18);
  --log-accent: #e11d48;
  --text-dark: #0f1a1f;
  --text-light: rgba(255,255,255,.92);
  --font: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
}

*{ box-sizing: border-box; }

body{
  margin:0;
  font-family: var(--font);
  background:#0f2330;
  color:white;
}

.app{ display:flex; min-height:100vh; }

.main{
  flex:1;
  background: var(--bg-main);
}

.top-strip{
  height:90px;
  background:var(--panel-top);
  color:var(--text-dark);
  display:flex;
  align-items:center;
  padding:0 22px;
  gap:14px;
}

.sidebar-toggle{
  border:none;
  background:white;
  width:44px;
  height:44px;
  border-radius:12px;
  cursor:pointer;
  font-size:22px;
}

.top-strip h1{
  margin:0;
  flex:1;
}

.points-pill{
  background:#9fe19a;
  border:none;
  border-radius:10px;
  padding:10px 14px;
  font-family:var(--font);
  font-size:14px;
  color:#0f1a1f;
}

.content{ padding:28px; }

.log-list{
  width:min(650px,95%);
  margin:0 auto;
  display:flex;
  flex-direction:column;
  gap:16px;
}

.log-item{
  background:var(--log-row);
  border:2px solid rgba(0,0,0,.18);
  box-shadow:0 10px 18px rgba(0,0,0,.16);
  overflow:hidden;
  transition:all .2s ease;
}

.log-header{
  display:flex;
  align-items:center;
  cursor:pointer;
}

.log-accent{
  width:10px;
  height:56px;
  background:var(--log-accent);
}

.log-text{
  padding:0 16px;
  height:56px;
  display:flex;
  align-items:center;
  color:var(--text-light);
  font-size:14px;
  flex:1;
}

.log-body{
  display:none;
  padding:16px;
  border-top:1px solid rgba(255,255,255,.15);
  background:rgba(0,0,0,.15);
  white-space:pre-wrap;
  font-size:13px;
  line-height:1.5;
}

.log-item.active .log-body{
  display:block;
}

/* Sidebar */
.overlay{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.45);
  opacity:0;
  pointer-events:none;
  transition:opacity .2s;
}
.overlay.open{
  opacity:1;
  pointer-events:auto;
}

.sidebar{
  position:fixed;
  top:0;
  left:0;
  height:100vh;
  width:280px;
  background:var(--bg-sidebar);
  color:var(--text-dark);
  padding:24px 14px;
  transform:translateX(-110%);
  transition:transform .22s ease;
  display:flex;
  flex-direction:column;
}
.sidebar.open{
  transform:translateX(0);
}

.nav{ flex:1; display:flex; flex-direction:column; gap:10px; }

.nav button,
.logout button{
  border:none;
  border-radius:10px;
  padding:12px 14px;
  background:white;
  cursor:pointer;
  font-family:var(--font);
}

.logout{
  margin-top:auto;
}

.logout button{
  background:#d83a4a;
}
</style>
</head>

<body>
<div class="app">

<div class="overlay" id="overlay" onclick="closeSidebar()"></div>

<aside class="sidebar" id="sidebar">
  <nav class="nav">
    <button onclick="navigateTo('{{ url_for('home') }}')">home</button>
    <button onclick="navigateTo('{{ url_for('settings') }}')">settings</button>
    <button onclick="navigateTo('{{ url_for('profile') }}')">profile</button>
    <button onclick="navigateTo('{{ url_for('workoutLog') }}')">history</button>
    <button onclick="navigateTo('{{ url_for('shop') }}')">shop</button>
  </nav>
  <div class="logout">
    <button onclick="navigateTo('{{ url_for('logout') }}')">logout</button>
  </div>
</aside>

<main class="main">
<header class="top-strip">
  <button class="sidebar-toggle" onclick="openSidebar()">☰</button>
  <h1>Workout log</h1>
  <button class="points-pill" disabled>
    Points: {{ points }}
  </button>
</header>

<div class="content">
<div class="log-list">

{% if history %}
  {% for workout in history[::-1] %}
    {% set first_line = workout.split('\n')[0] %}

    <div class="log-item">
      <div class="log-header" onclick="toggleWorkout(this)">
        <div class="log-accent"></div>
        <div class="log-text">
          {{ first_line }} - Plan {{ loop.index }}
        </div>
      </div>

      <div class="log-body">
        {{ workout }}
      </div>
    </div>

  {% endfor %}
{% else %}
  <div class="log-item">
    <div class="log-header">
      <div class="log-accent"></div>
      <div class="log-text">
        No workout history yet.
      </div>
    </div>
  </div>
{% endif %}

</div>
</div>
</main>
</div>

<script>
function toggleWorkout(element){
  const parent = element.parentElement;
  parent.classList.toggle("active");
}

function openSidebar(){
  document.getElementById("sidebar").classList.add("open");
  document.getElementById("overlay").classList.add("open");
}

function closeSidebar(){
  document.getElementById("sidebar").classList.remove("open");
  document.getElementById("overlay").classList.remove("open");
}

function navigateTo(path){
  closeSidebar();
  window.location.href = path;
}

document.addEventListener("keydown", e=>{
  if(e.key==="Escape") closeSidebar();
});
</script>

</body>
</html>
