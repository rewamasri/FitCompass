<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Fit Compass - Workout Log</title>

<style>
:root{
  --bg-main: #1f4d69;
  --bg-sidebar: #d8eff4;
  --panel-top: #d8eff4;
  --log-row: rgba(0,0,0,.18);
  --log-accent: #e11d48;
  --text-dark: #0f1a1f;
  --text-light: rgba(255,255,255,.92);
  --font: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
}

*{ box-sizing: border-box; }

body{
  margin:0;
  font-family: var(--font);
  background:#0f2330;
  color:white;
}

.app{
  display:flex;
  min-height:100vh;
}

/* sidebar (same as home page) */


.sidebar{
  width:260px;
  background:var(--bg-sidebar);
  color:var(--text-dark);
  display:flex;
  flex-direction:column;
  padding:18px 14px;
  border-right:3px solid rgba(0,0,0,.08);

  position:fixed;
  top:0;
  left:0;
  height:100vh;
}

.sidebar-title{
  font-size:20px;
  margin-bottom:10px;
}

.nav{
  display:flex;
  flex-direction:column;
  gap:10px;
  flex:1;
}

.banner{
  background:rgba(255,255,255,.12);
  padding:14px;
  border-radius:12px;
  margin:20px;
  margin-bottom:0;
}

.nav button{
  border:none;
  border-radius:10px;
  padding:12px;
  background:white;
  font-family:var(--font);
  cursor:pointer;
  text-align:left;
  box-shadow:0 4px 10px rgba(0,0,0,.08);
}

.logout button{
  border:none;
  border-radius:10px;
  padding:14px;
  background:#d83a4a;
  font-family:var(--font);
  cursor:pointer;
  color:white;
}

/* MAIN */

.main{
  flex:1;
  margin-left:260px;
  background: var(--bg-main);
}

.top-strip{
  height:90px;
  background:var(--panel-top);
  color:var(--text-dark);
  display:flex;
  align-items:center;
  padding:0 22px;
  gap:14px;
}

.top-strip h1{
  margin:0;
  flex:1;
}

.points-pill{
  background:#9fe19a;
  border:none;
  border-radius:10px;
  padding:10px 14px;
  font-family:var(--font);
  font-size:14px;
  color:#0f1a1f;
}

.content{
  padding:28px;
}

.log-list{
  width:min(650px,95%);
  margin:0 auto;
  display:flex;
  flex-direction:column;
  gap:16px;
}

.log-item{
  background:var(--log-row);
  border:2px solid rgba(0,0,0,.18);
  box-shadow:0 10px 18px rgba(0,0,0,.16);
  overflow:hidden;
  transition:all .25s ease;
  border-radius:10px;
}

.log-header{
  display:flex;
  align-items:center;
  cursor:pointer;
}

.log-accent{
  width:10px;
  height:56px;
  background:linear-gradient(180deg,#e11d48,#fb7185);
}

.log-text{
  padding:0 18px;
  height:56px;
  display:flex;
  align-items:center;
  color:var(--text-light);
  font-size:15px;
  flex:1;
  font-weight:600;
  letter-spacing:.08em;
  text-transform:uppercase;
}

.log-body{
  display:none;
  padding:22px;
  background:linear-gradient(
    rgba(20,40,50,.9),
    rgba(15,30,40,.95)
  );
  border-top:1px solid rgba(255,255,255,.12);
  color:#e6f4f7;
  font-size:14px;
  line-height:1.9;
  letter-spacing:.03em;
  border-radius:0 0 12px 12px;
  box-shadow:
    inset 0 2px 6px rgba(0,0,0,.35),
    0 6px 16px rgba(0,0,0,.25);
  white-space:pre-wrap;
  max-height:260px;
  overflow-y:auto;
  flex-direction:column;
  gap:12px;
}

.log-item.active .log-body{
  display:flex;
}

.exercise-card{
  background:#d8eff4;
  border-left:4px solid #a9d99b;
  padding:12px 16px;
  border-radius:8px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  color:black;
}

.exercise-name{
  font-weight:600;
}

.exercise-reps{
  opacity:.8;
}

</style>
</head>

<body>

<div class="app">

<!-- SIDEBAR -->

<aside class="sidebar">

  <div class="sidebar-title">FitCompass</div>

  <div class="nav">
      <button onclick="location.href='{{ url_for('home') }}'">Home</button>
      <button onclick="location.href='{{ url_for('profile') }}'">Profile</button>
      <button onclick="location.href='{{ url_for('history') }}'">History</button>
      <button onclick="location.href='{{ url_for('library') }}'">Library</button>
      <button onclick="location.href='{{ url_for('shop') }}'">Shop</button>
  </div>

  <div class="logout">
      <button onclick="location.href='{{ url_for('logout') }}'">Log Out</button>
  </div>

</aside>

<!-- MAIN -->

<main class="main">

<div class="banner">
  <strong>Workout Log</strong>
</div>

<div style="padding:0 22px 10px 22px;">
  <button class="points-pill" disabled>
    Points: {{ points }}
  </button>
</div>

<div class="content">
<div class="log-list">

{% if history %}
  {% for workout in history[::-1] %}
    {% set first_line = workout.split('\n')[0] %}

    <div class="log-item">
      <div class="log-header" onclick="toggleWorkout(this)">
        <div class="log-accent"></div>

        <div class="log-text">
          {{ first_line }} - Plan {{ loop.index }}
        </div>
      </div>

      <div class="log-body">
        {{ workout }}
      </div>
    </div>

  {% endfor %}

{% else %}

  <div class="log-item">
    <div class="log-header">
      <div class="log-accent"></div>

      <div class="log-text">
        No workout history yet.
      </div>
    </div>
  </div>

{% endif %}

</div>
</div>

</main>

</div>

<script>

function toggleWorkout(element){

  const parent = element.parentElement;
  const body = parent.querySelector(".log-body");

  if(parent.classList.contains("active")){
    parent.classList.remove("active");
    body.style.display = "none";
    return;
  }

  parent.classList.add("active");
  body.style.display = "flex";

  if(body.dataset.parsed) return;

  const raw = body.innerText.trim().split("\n");
  const exercises = raw.slice(1);

  body.innerHTML = exercises.map(line=>{
    const parts = line.trim().split(" ");
    const reps = parts.pop();
    const name = parts.join(" ");

    return `
      <div class="exercise-card">
        <span class="exercise-name">${name}</span>
        <span class="exercise-reps">${reps}</span>
      </div>
    `;
  }).join("");

  body.dataset.parsed = true;
}

</script>

</body>
</html>
