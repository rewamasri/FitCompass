<!DOCTYPE html>
<html>
<head>
<title>Shop</title>
<style>
body {
    font-family: monospace;
    background:#1f4d69;
    color:white;
    text-align:center;
}

.shop-container {
    display:flex;
    justify-content:center;
    gap:40px;
    margin-top:40px;
}

.card {
    background:#2c5a73;
    padding:20px;
    width:220px;
    border-radius:12px;
}

button {
    padding:8px 12px;
    margin:6px;
    border:none;
    border-radius:6px;
    cursor:pointer;
}

.buy { background:#4CAF50; color:white; }
.wear { background:#2196F3; color:white; }
.message { color:#ffaaaa; font-size:14px; }
</style>
</head>
<body>

<h1>Costume Shop</h1>
<h2>Coins: <span id="coins">{{ coins }}</span></h2>

<div class="shop-container">

{% for name, cost in [("fireman",200),("astronaut",300),("cowboy",250)] %}

<div class="card">
    <h3>{{ name.capitalize() }}</h3>
    <p>Cost: {{ cost }}</p>

    <button class="buy"
        {% if name in owned %}disabled{% endif %}
        onclick="buy('{{name}}',{{cost}},this)">
        {% if name in owned %}Owned{% else %}Buy{% endif %}
    </button>

    <button class="wear"
        {% if name not in owned %}disabled{% endif %}
        onclick="wear('{{name}}')">
        {% if equipped == name %}Wearing{% else %}Wear{% endif %}
    </button>

    <div class="message"></div>
</div>

{% endfor %}

</div>

<script>
function buy(name, cost, btn){
    const card = btn.parentElement;
    const msg = card.querySelector(".message");

    fetch("/buy_costume", {
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({costume:name, cost:cost})
    })
    .then(res=>res.json())
    .then(data=>{
        if(data.status==="success"){
            document.getElementById("coins").innerText = data.new_coins;
            btn.innerText="Owned";
            btn.disabled=true;
            card.querySelector(".wear").disabled=false;
            msg.innerText="";
        }
        else if(data.status==="not_enough"){
            msg.innerText="Not enough coins!";
        }
        else if(data.status==="already_owned"){
            msg.innerText="Already owned!";
        }
    });
}

function wear(name){
    fetch("/wear_costume", {
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({costume:name})
    })
    .then(res=>res.json())
    .then(data=>{
        if(data.status==="success"){
            location.reload();
        }
    });
}
</script>

</body>
</html>
